<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orgrafeg Neuıð</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <style>
     * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
     }

     body {
         font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background-color: #ffffff;
         color: #202124;
         line-height: 1.6;
     }

     .header {
         background-color: #ffffff;
         padding: 12px 0;
         position: sticky;
         top: 0;
         z-index: 100;
         overflow: visible;
     }

     .header::before {
         content: '';
         position: absolute;
         top: 0;
         left: 0;
         width: 0;
         height: 0;
         border-style: solid;
         border-width: 140px 140px 0 0;
         border-color: #00B140 transparent transparent transparent;
         z-index: -1;
     }

     .header-content {
         /* max-width: 1240px; */
         margin: 0 auto;
         padding-left: 35px;
         display: flex;
         align-items: center;
         gap: 12px;
         justify-content: flex-start;
     }

     .logo-wrapper {
         display: flex;
         align-items: center;
         gap: 12px;
         position: relative;
         z-index: 1;
     }

     .logo {
         width: 80px;
         height: 80px;
         margin-left: 8px;
     }

     .logo path {
         fill: #C8102E;
     }

     .site-title {
         font-family: 'Uncial Antiqua', serif;
         font-size: 26px;
         font-weight: 400;
         color: #C8102E;
         letter-spacing: 0.5px;
     }

     .container {
         max-width: 1240px;
         margin: 0 auto;
         padding: 0 24px;
     }

     .translator-wrapper {
         background-color: #ffffff;
         border: 1px solid #dadce0;
         border-radius: 8px;
         overflow: hidden;
         margin: 24px 0;
     }

     .textarea-container {
         display: grid;
         grid-template-columns: 1fr 1fr;
         position: relative;
         align-items: stretch;
     }

     .textarea-wrapper {
         position: relative;
         display: block;
     }

     .textarea-wrapper:first-child {
         border-right: 1px solid #dadce0;
     }

     textarea {
         width: 100%;
         padding: 20px;
         border: none;
         font-family: 'Roboto', sans-serif;
         font-size: 24px;
         line-height: 32px;
         resize: none;
         outline: none;
         background: transparent;
         min-height: 300px;
         overflow: hidden;
         display: block;
     }

     #original {
         color: #202124;
     }

     #original::placeholder {
         color: #5f6368;
         font-size: 24px;
     }

     #new {
         color: #00B140;
         background-color: #f8f9fa;
     }

     #new::placeholder {
         color: #5f6368;
         opacity: 0.7;
     }

     .tools {
         position: absolute;
         bottom: 12px;
         right: 20px;
         display: flex;
         gap: 8px;
     }

     .tool-button {
         width: 32px;
         height: 32px;
         border: none;
         background-color: transparent;
         cursor: pointer;
         display: flex;
         align-items: center;
         justify-content: center;
         border-radius: 50%;
         transition: background-color 0.2s;
     }

     .tool-button:hover {
         background-color: #f1f3f4;
     }

     .tool-button svg {
         width: 20px;
         height: 20px;
         fill: #5f6368;
     }

     .footer {
         text-align: center;
         padding: 24px;
         color: #5f6368;
         font-size: 13px;
     }

     /* Mobile responsiveness */
     @media (max-width: 768px) {
         .header-content {
             padding: 0 16px;
         }

         .header {
             overflow: hidden;
         }

         .container {
             padding: 0 16px;
         }

         .textarea-container {
             grid-template-columns: 1fr;
             min-height: auto;
         }

         .textarea-wrapper:first-child {
             border-right: none;
             border-bottom: 1px solid #dadce0;
         }

         textarea {
             min-height: 150px;
             padding: 16px;
             font-size: 18px;
             line-height: 24px;
             width: 100%;
         }

         #original::placeholder {
             font-size: 18px;
         }

         .site-title {
             font-size: 18px;
         }

         .logo {
             width: 28px;
             height: 28px;
         }
     }

     /* Focus styles */
     textarea:focus {
         outline: none;
     }

     .textarea-wrapper:has(textarea:focus) {
         box-shadow: inset 0 0 0 2px #1a73e8;
     }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-wrapper">
                <svg class="logo" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
                    <path d="m 19,231 h 1 c 3.326305,-17.15213 9.377666,-34.89685 23.003857,-46.69984 4.764324,-4.12685 10.04655,-7.34603 15.996143,-9.43519 37.467537,-13.1565 64.55919,19.74695 69,54.13503 7.90826,-5.40222 14.92738,-11.51894 25,-11.96065 28.13304,-1.2337 59.62381,33.01358 56.82947,60.96065 -2.14955,21.49829 -23.32087,38.30287 -44.51748,27.92683 L 178,299 c -18.52811,2.34363 -27.34081,-1.24844 -43,-11 13.17358,31.63345 56.98302,43.79398 82.90665,17.90665 C 229.069,294.75992 232.35181,278.21576 230.82947,263 228.33652,238.08307 207.57104,220.20554 190,204.71451 154.64893,173.54822 101.54314,136.29227 109.30016,82 111.57378,66.08667 120.32509,54.473083 128,41 114.426,42.829376 100.59833,50.199432 89,57.203705 42.814209,85.095398 20.670273,133.71078 17.089506,186 16.05295,201.13663 18.875502,215.96069 19,231 M 232,41 c 5.31497,6.617615 11.38631,12.133667 15.10957,20 15.32729,32.38269 6.11566,69.19257 -28.10957,84.12424 -7.7605,3.38572 -15.61612,4.20677 -24,3.83641 -21.1555,-0.93456 -51.73654,-22.95967 -38.94986,-46.9568 6.4603,-12.124211 23.17007,-14.457952 31.43983,-3.000005 C 192.06906,105.34828 191.34686,113.7453 190,121 c 7.53937,-3.59242 10.63634,-12.04143 11,-20 8.30313,3.90474 7.10681,13.87939 8,23 5.55219,-7.19728 8.47955,-15.92213 7.51003,-27 C 214.61778,77.06805 188.71657,65.528717 170,64 c 0,0 5.3875,7.06094 8,10 -8.32755,-0.657227 -16.1329,-1.411865 -24,2.327942 C 133.97784,85.845917 132.11607,113.8336 139.45293,132 c 11.03811,27.33089 37.98384,43.11006 58.71682,62.32484 C 210.09494,205.37679 219.37093,219.81696 232,230 c 3.08266,-39.00751 40.03036,-76.61603 79,-49.77931 18.02325,12.41185 22.45004,31.46847 29,50.77931 5.93246,-14.10597 3.59976,-37.03424 2.16977,-52 C 337.86383,133.93559 317.15027,96.149139 282,66.920532 268.01617,55.292511 250.38472,43.715179 232,41 Z"/>
                </svg>
                <h1 class="site-title">Orgrafeg Neuıð</h1>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="translator-wrapper">
            <div class="textarea-container">
                <div class="textarea-wrapper">
                    <textarea id="original" placeholder="Enter text" oninput="updateTranslation()" onpaste="setTimeout(updateTranslation, 0)"></textarea>
                    <div class="tools">
                        <button class="tool-button" onclick="clearText()" title="Clear">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="new" placeholder="Transliteration" readonly></textarea>
                    <div class="tools">
                        <button class="tool-button" onclick="copyTranslation()" title="Copy">
                            <svg viewBox="0 0 24 24">
                                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function neuz(old) {
            return old
                .replaceAll(/ae/g, "æ")
                .replaceAll(/A[Ee]/g, "Æ")
                .replaceAll(/ch/g, "x")
                .replaceAll(/C[Hh]/g, "X")
                .replaceAll(/dd/g, "ð")
                .replaceAll(/D[Dd]/g, "Ð")
                .replaceAll(/ff/g, "q")
                .replaceAll(/F[Ff]/g, "Q")
                .replaceAll(/ng/g, "ṅ")
                .replaceAll(/N[Gg]/g, "Ṅ")
                .replaceAll(/ll/g, "ħ")
                .replaceAll(/L[Ll]/g, "Ħ")
                .replaceAll(/c/g, "k")
                .replaceAll(/C/g, "K")
                .replaceAll(/f/g, "v")
                .replaceAll(/F/g, "V")
                .replaceAll(/q/g, "f")
                .replaceAll(/Q/g, "F")
                .replaceAll(/I/g, "İ")
                .replaceAll(/y/g, "ı")
                .replaceAll(/Y/g, "I")
                .replaceAll(/u/g, "y")
                .replaceAll(/U/g, "Y")
                .replaceAll(/w/g, "u")
                .replaceAll(/W/g, "U");
        }

     function autoResize(textarea) {
         // Reset height to auto to get the correct scrollHeight
         textarea.style.height = 'auto';
         // Set the height to scrollHeight to fit all content
         const newHeight = Math.max(300, textarea.scrollHeight);
         textarea.style.height = newHeight + 'px';
         
         // Also resize the companion textarea to match heights
         const original = document.getElementById('original');
         const translated = document.getElementById('new');
         const maxHeight = Math.max(original.scrollHeight, translated.scrollHeight, 300);
         original.style.height = maxHeight + 'px';
         translated.style.height = maxHeight + 'px';
     }

     function updateTranslation() {
         const original = document.getElementById('original');
         const translated = document.getElementById('new');
            
            translated.value = neuz(original.value);
            autoResize(original);
            autoResize(translated);
        }

        function clearText() {
            document.getElementById('original').value = '';
            document.getElementById('new').value = '';
            autoResize(document.getElementById('original'));
            autoResize(document.getElementById('new'));
        }

        function copyTranslation() {
            const translated = document.getElementById('new');
            translated.select();
            document.execCommand('copy');
            
            // Visual feedback
            const button = event.currentTarget;
            button.style.backgroundColor = '#e8f0fe';
            setTimeout(() => {
                button.style.backgroundColor = 'transparent';
            }, 200);
        }
        
        // Initialize auto-resize on page load
        window.addEventListener('load', () => {
            autoResize(document.getElementById('original'));
            autoResize(document.getElementById('new'));
        });
    </script>
</body>
</html>
